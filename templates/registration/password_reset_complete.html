{% extends 'base.html' %} {% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 text-center">
        <h2 class="fw-bold mb-3">Password Reset Successful 🎉</h2>
        <p>
          Your password has been changed. You can now
          <a href="{% url 'login' %}">login</a> with your new password.
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
